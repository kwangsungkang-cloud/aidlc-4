version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: tableorder-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: tableorder
      MYSQL_USER: tableorder
      MYSQL_PASSWORD: tableorder123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: tableorder-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  localstack:
    image: localstack/localstack:latest
    container_name: tableorder-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=ap-northeast-2
    volumes:
      - localstack-data:/var/lib/localstack

volumes:
  mysql-data:
  redis-data:
  localstack-data:
